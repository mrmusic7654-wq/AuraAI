name: Crash Test

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  crash-test:
    name: Launch App on Emulator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run crash test with logcat capture
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          script: |
            adb logcat -c  # Clear logcat
            ./gradlew :app:connectedDebugAndroidTest || true  # Run test, continue even if fail
            adb logcat -d > logcat.txt  # Save all logs

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/androidTests/connected/
            logcat.txt
