name: Build Aura AI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile Kotlin directly (shows actual errors)
        run: ./gradlew :app:compileDebugKotlin --info 2>&1 | grep -A 2 -E "^e:|error:|FAILED|What went wrong"

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraAI-debug
          path: app/build/outputs/apk/debug/app-debug.apk
