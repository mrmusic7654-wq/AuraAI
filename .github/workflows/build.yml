name: Build Aura AI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile Kotlin separately to see real errors
        continue-on-error: true
        run: ./gradlew :app:compileDebugKotlin --info 2>&1 | tee kotlin_compile.log

      - name: Show Kotlin compilation errors
        run: |
          echo "================================"
          echo " KOTLIN COMPILATION ERRORS "
          echo "================================"
          grep "^e:" kotlin_compile.log || echo "No Kotlin errors found"
          echo ""
          echo "================================"
          echo " ERROR AND FAILURE LINES "
          echo "================================"
          grep -i -E "error|failure|could not" kotlin_compile.log | head -40

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AuraAI-debug
          path: app/build/outputs/apk/debug/app-debug.apk
