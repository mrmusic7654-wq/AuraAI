name: Build Aura AI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK (show errors only)
        continue-on-error: true
        run: |
          ./gradlew assembleDebug 2>&1 | tee full_build.log
          echo "BUILD_EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Show Kotlin Errors
        if: success() || failure()
        run: |
          echo "================================"
          echo " KOTLIN COMPILATION ERRORS "
          echo "================================"
          grep "^e:" full_build.log || echo "No Kotlin errors (e: lines) found"
          echo ""
          echo "================================"
          echo " FAILURE REASON "
          echo "================================"
          grep -A 20 "What went wrong" full_build.log || echo "No failure section found"
          echo ""
          echo "================================"
          echo " ERROR MODULE DETAILS "
          echo "================================"
          grep -B 2 -A 5 "Error module" full_build.log || echo "No error module details"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AuraAI-debug
          path: app/build/outputs/apk/debug/app-debug.apk
